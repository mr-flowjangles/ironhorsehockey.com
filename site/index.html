<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IronHorse Hockey Academy — Built To Compete</title>
  <meta name="description" content="IronHorse Hockey Academy — youth development camps. Train. Compete. Improve. Camp #1: July 31 – Aug 2, 2026 · New Ulm, MN." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Oswald:wght@500;600;700&family=Anton&family=Saira+Condensed:wght@600;700;800&family=Russo+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- Tweakable defaults — the host rewrites this block when controls change. -->
  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "electric",
      "displayFont": "bigShoulders",
      "grit": "regular",
      "scanlines": false
    }/*EDITMODE-END*/;
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks panel (uses TweaksPanel, useTweaks, TweakSection etc.) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App pieces. Order matters: icons + sections defined before App composes them. -->
  <script type="text/babel" src="src/icons.jsx?v=3"></script>
  <script type="text/babel" src="src/nav.jsx?v=3"></script>
  <script type="text/babel" src="src/hero.jsx?v=3"></script>
  <script type="text/babel" src="src/about.jsx?v=3"></script>
  <script type="text/babel" src="src/schedule.jsx?v=3"></script>
  <script type="text/babel" src="src/register.jsx?v=3"></script>
  <script type="text/babel" src="src/footer.jsx?v=3"></script>
  <script type="text/babel" src="src/app.jsx?v=3"></script>

  <!-- Mount -->
  <script type="text/babel" data-presets="env,react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
